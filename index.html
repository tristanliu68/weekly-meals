<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>本周吃什么</title>
  <style>
    :root{--ink:#354037;--muted:#78837a;--cream:#fbf8ed;--line:#e9e7dc;--orange:#e97842;--green:#668265;--sage:#e6f0e2;--shadow:0 18px 48px rgba(84,78,52,.09)}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 95% 0,#f6e5b6 0 10%,transparent 28%),radial-gradient(circle at 4% 100%,#ddecda 0 9%,transparent 27%),var(--cream);color:var(--ink);font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif}button,input,textarea,select{font:inherit}button{cursor:pointer;border:0}main{max-width:1370px;margin:auto;padding:0 32px}.bar{height:82px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(101,119,100,.14)}.brand{font:700 21px Georgia,"Songti SC",serif;display:flex;gap:10px;align-items:center}.mark{width:35px;height:35px;border-radius:12px;display:grid;place-items:center;background:#dcebd7}.bar-actions{display:flex;gap:18px;align-items:center}.text-btn{background:none;color:#6e796f;font-size:13px}.avatar{border-radius:50%;width:36px;height:36px;background:#efc48b;color:#72502c;font-weight:bold}.hero{padding:65px 3px 31px;display:flex;justify-content:space-between;align-items:end;gap:24px}.eyebrow{margin:0 0 9px;color:#7e987e;font-size:12px;letter-spacing:.13em;font-weight:bold}.hero h1,.panel-title,h2{font-family:Georgia,"Songti SC",serif;letter-spacing:-.055em}.hero h1{margin:0 0 12px;font-size:clamp(38px,5vw,59px);line-height:1.08}.hero h1 em{color:var(--orange);font-style:normal}.hero p{margin:0;color:var(--muted)}.today{min-width:250px;border:1px solid #e8dfc9;border-radius:15px;padding:14px 17px;background:rgba(255,255,255,.7);box-shadow:0 8px 20px rgba(80,70,40,.05);font-size:13px}.today b,.today span{display:block}.today b{margin-bottom:4px}.today span{color:var(--muted)}.panel{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);overflow:hidden}.panel-head{padding:27px 29px 18px;display:flex;justify-content:space-between;align-items:center;gap:20px}.date-row{display:flex;align-items:center;gap:13px}.round{width:31px;height:31px;border-radius:50%;border:1px solid var(--line);background:#fff;color:#738073;font-size:22px}.panel-title{margin:0;font-size:25px}.actions{display:flex;gap:10px}.secondary,.primary{padding:11px 16px;border-radius:11px;font-size:13px;font-weight:bold}.secondary{background:#eef4eb;color:#6c806a}.primary{background:var(--orange);color:#fffaf0;box-shadow:0 6px 13px rgba(211,107,50,.19)}.notice{margin:0 29px 15px;color:#809080;font-size:12px}.notice i{color:#99b392;font-style:normal;margin-right:7px}.week{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid #eeece3}.day{position:relative;min-height:286px;padding:18px 13px 14px;border-right:1px solid #eeece3}.day:last-child{border:0}.day.today-col{background:linear-gradient(180deg,#edf6e9,transparent)}.day-top{display:flex;align-items:center;justify-content:space-between}.num{font:25px Georgia,serif}.day-name{font-size:12px;color:#7c877d;margin-left:5px}.pill{padding:3px 7px;border-radius:99px;background:#dcebd7;color:#5b795e;font-size:10px;font-weight:bold}.short{display:block;margin:8px 0 14px;color:#a2aaa0;font-size:9px;letter-spacing:.13em}.stack{display:grid;gap:8px}.dish{position:relative;display:flex;gap:7px;align-items:flex-start;min-height:59px;padding:10px 7px 8px 10px;border-radius:11px}.dish.sage{background:#e6f0e2}.dish.peach{background:#fae5d7}.dish.butter{background:#f8edcb}.dish.lilac{background:#eae6f0}.dot{width:6px;height:6px;margin-top:5px;border-radius:50%;background:#748174}.dish-copy{flex:1;min-width:0;background:none;text-align:left;padding:0;color:var(--ink)}.dish-copy b,.dish-copy span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.dish-copy b{font-size:13px}.dish-copy span{margin-top:4px;color:#748077;font-size:10px}.more{background:none;color:#758176;font-size:13px;padding:0 2px}.menu{display:none;position:absolute;right:2px;top:33px;z-index:4;width:120px;padding:5px;border:1px solid #e7e3d7;border-radius:10px;background:#fff;box-shadow:0 12px 25px rgba(63,62,49,.13)}.menu.show{display:grid}.menu button{padding:7px;background:none;text-align:left;border-radius:6px;font-size:11px;color:#4e584f}.menu button:hover{background:#f4f6ef}.menu .danger{color:#c75c47}.add{margin-top:12px;background:none;color:#8b9788;font-size:11px}.add span{font-size:16px}.candidates{margin:42px 0 50px}.section-head{display:flex;justify-content:space-between;align-items:end;margin-bottom:18px}.section-head h2{margin:0;font-size:27px}.section-head h2 small{display:inline-grid;place-items:center;min-width:20px;height:20px;vertical-align:3px;border-radius:50%;background:#dce9d7;color:#63805e;font:700 11px Arial}.list{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.candidate{min-height:105px;display:flex;align-items:center;gap:12px;padding:15px;border:1px solid #e6e4da;border-radius:17px;background:rgba(255,255,255,.78);box-shadow:0 9px 24px rgba(85,86,62,.04)}.emoji{width:41px;height:41px;display:grid;place-items:center;flex:0 0 41px;border-radius:13px;background:#f8efd8;font-size:20px}.candidate div{min-width:0;flex:1}.candidate b,.candidate p{display:block;margin:0}.candidate b{font-size:14px}.candidate p{margin-top:5px;font-size:11px;color:#849084;line-height:1.4}.plus{width:25px;height:25px;flex:0 0 25px;border-radius:50%;background:#f4f8f1;border:1px solid #d8e2d3;color:#6e8a68;font-size:18px}.candidate.add-candidate{display:block;text-align:center;border-style:dashed;color:#788877}.candidate.add-candidate .big-plus{display:grid;place-items:center;width:27px;height:27px;margin:0 auto 7px;border-radius:50%;background:#edf4e9;font-size:20px}.candidate.add-candidate p{font-size:10px}footer{padding:0 0 30px;text-align:center;color:#9aa297;font:12px Georgia,"Songti SC",serif}.modal-bg{display:none;position:fixed;inset:0;z-index:10;place-items:center;padding:20px;background:rgba(45,53,43,.28);backdrop-filter:blur(5px)}.modal-bg.show{display:grid}.modal{width:min(100%,450px);padding:25px;border:1px solid #e8e3d5;border-radius:22px;background:#fffdf8;box-shadow:0 24px 70px rgba(38,45,36,.22)}.modal-top{display:flex;justify-content:space-between;align-items:start;margin-bottom:24px}.modal h2{margin:0;font-size:29px}.close{border-radius:50%;width:30px;height:30px;background:#f2f0e8;color:#697166;font-size:21px}.modal label{display:block;margin-bottom:15px;color:#697467;font-size:12px;font-weight:bold}.modal input,.modal textarea,.modal select{width:100%;margin-top:7px;padding:11px 12px;border:1px solid #e5e4da;border-radius:10px;outline:0;background:#fff;color:var(--ink);font-weight:normal}.modal textarea{resize:vertical}.modal-actions{display:flex;justify-content:end;gap:9px;margin-top:22px}@media(max-width:980px){.week{grid-template-columns:repeat(4,1fr)}.day:nth-child(4){border-right:0}.day:nth-child(n+5){border-top:1px solid #eeece3}.list{grid-template-columns:repeat(2,1fr)}}@media(max-width:620px){main{padding:0 13px}.bar{height:72px}.bar-actions .text-btn{display:none}.hero{display:block;padding:39px 1px 23px}.today{margin-top:22px}.panel{border-radius:20px}.panel-head{display:block;padding:21px 18px 14px}.date-row{justify-content:space-between}.panel-title{font-size:23px}.actions{margin-top:17px}.actions button{flex:1;padding:11px 7px}.notice{margin:0 18px 12px}.week{display:block;border-top:0}.day{min-height:0;padding:15px 16px 13px;border-right:0;border-top:1px solid #eeece3}.short{position:absolute;right:48px;top:17px;margin:0}.stack{margin-top:10px}.dish{min-height:53px}.candidates{margin:34px 0 42px}.list{display:flex;overflow-x:auto;padding-bottom:5px}.candidate{min-width:242px}.candidate.add-candidate{min-width:205px}}
  </style>
</head>
<body><main>
  <header class="bar"><div class="brand"><span class="mark">🍲</span>本周吃什么</div><div class="bar-actions"><button class="text-btn" onclick="notice('历史菜单将在下一轮接入本地保存')">◷ 历史菜单</button><button class="avatar">T</button></div></header>
  <section class="hero"><div><p class="eyebrow">一家人的用餐小计划</p><h1>安排好这一周，<em>好好吃饭。</em></h1><p>从容一点，把每天的小期待放进菜单里。</p></div><aside class="today"><b>✦ 今天吃什么？</b><span>番茄牛腩 + 清炒时蔬</span></aside></section>
  <section class="panel"><div class="panel-head"><div class="date-row"><button class="round" onclick="shift(-1)">‹</button><div><p class="eyebrow" style="margin-bottom:3px">本周菜单</p><h2 class="panel-title" id="range">7 月 13 日 — 19 日</h2></div><button class="round" onclick="shift(1)">›</button></div><div class="actions"><button class="secondary" onclick="notice('已复制上一周菜单（演示）')">↻ 复制上一周</button><button class="primary" onclick="notice('菜单海报已生成（演示）')">✦ 生成本周菜单</button></div></div><p class="notice" id="notice"><i>●</i>本周菜单已为你准备好</p><div class="week" id="week"></div></section>
  <section class="candidates"><div class="section-head"><div><p class="eyebrow" style="margin-bottom:4px">灵感收集处</p><h2>候选菜品 <small id="count">3</small></h2></div><button class="text-btn" onclick="notice('菜品库将在下一阶段逐步加入')">查看全部 →</button></div><div class="list" id="candidates"></div></section>
  <footer>好好吃饭，也好好生活。 · 这是一个可交互的菜单原型</footer>
</main>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()"><form class="modal" onsubmit="saveDish(event)"><div class="modal-top"><div><p class="eyebrow" id="modalKicker">记录一道想吃的菜</p><h2 id="modalTitle">新增菜品</h2></div><button type="button" class="close" onclick="closeModal()">×</button></div><label>菜品名称<input id="name" placeholder="例如：番茄牛腩" required></label><label>简单备注<textarea id="note" rows="3" placeholder="例如：提前准备食材、口味偏好…"></textarea></label><label>安排日期<select id="date"></select></label><div class="modal-actions"><button type="button" class="secondary" onclick="closeModal()">取消</button><button class="primary" id="saveBtn">加入菜单</button></div></form></div>
<script>
const days=[['mon','周一','MON',13],['tue','周二','TUE',14],['wed','周三','WED',15],['thu','周四','THU',16],['fri','周五','FRI',17],['sat','周六','SAT',18],['sun','周日','SUN',19]];let offset=0,editing=null,nextId=20;let dishes=[['番茄牛腩','炖得久一点更香','mon','peach'],['清炒时蔬','买上海青','mon','sage'],['三文鱼饭','配味噌汤','tue','butter'],['菌菇鸡汤','提前泡香菇','wed','lilac'],['家常豆腐','微辣','thu','sage'],['黑椒意面','周五轻松一点','fri','butter'],['火锅夜','和家人一起吃','sat','peach'],['葱油拌面','加一份溏心蛋','sun','lilac']].map((x,i)=>({id:i+1,name:x[0],note:x[1],day:x[2],tone:x[3]}));let candidates=[{id:101,name:'照烧鸡腿饭',note:'25 分钟 · 很适合工作日',emoji:'🍗'},{id:102,name:'虾仁滑蛋',note:'15 分钟 · 食材简单',emoji:'🍤'},{id:103,name:'南瓜浓汤',note:'周末可多做一些',emoji:'🎃'}];
function notice(t){document.getElementById('notice').innerHTML='<i>●</i>'+t}function shift(n){offset+=n;document.getElementById('range').textContent=`7 月 ${13+offset*7} 日 — ${19+offset*7} 日`;render()}
function render(){const week=document.getElementById('week');week.innerHTML=days.map((d,i)=>{const items=dishes.filter(x=>x.day===d[0]);return `<article class="day ${i===0?'today-col':''}"><div class="day-top"><div><span class="num">${d[3]+offset*7}</span><span class="day-name">${d[1]}</span></div>${i===0?'<span class="pill">今天</span>':''}</div><span class="short">${d[2]}</span><div class="stack">${items.map(x=>`<div class="dish ${x.tone}"><i class="dot"></i><button class="dish-copy" onclick="openEdit(${x.id})"><b>${x.name}</b><span>${x.note||'没有备注'}</span></button><button class="more" onclick="toggleMenu(${x.id})">•••</button><div class="menu" id="menu-${x.id}"><button onclick="openEdit(${x.id})">编辑菜品</button><button onclick="moveCandidate(${x.id})">移至候选区</button><button class="danger" onclick="removeDish(${x.id})">删除</button></div></div>`).join('')}</div><button class="add" onclick="openAdd('${d[0]}')"><span>＋</span> 添加菜品</button></article>`}).join('');const select=document.getElementById('date');select.innerHTML=days.map(d=>`<option value="${d[0]}">${d[1]} · 7 月 ${d[3]+offset*7} 日</option>`).join('');renderCandidates()}
function renderCandidates(){document.getElementById('count').textContent=candidates.length;document.getElementById('candidates').innerHTML=candidates.map(x=>`<article class="candidate"><span class="emoji">${x.emoji}</span><div><b>${x.name}</b><p>${x.note}</p></div><button class="plus" onclick="arrange(${x.id})">＋</button></article>`).join('')+`<button class="candidate add-candidate" onclick="openAdd('mon')"><span class="big-plus">＋</span><b>添加新的候选菜</b><p>把想吃的先放在这里</p></button>`}
function toggleMenu(id){document.querySelectorAll('.menu').forEach(x=>x.classList.remove('show'));document.getElementById('menu-'+id).classList.add('show')}function openAdd(day){editing=null;document.getElementById('modalKicker').textContent='记录一道想吃的菜';document.getElementById('modalTitle').textContent='新增菜品';document.getElementById('saveBtn').textContent='加入菜单';document.getElementById('name').value='';document.getElementById('note').value='';document.getElementById('date').value=day;document.getElementById('modalBg').classList.add('show');setTimeout(()=>document.getElementById('name').focus(),20)}function openEdit(id){editing=dishes.find(x=>x.id===id);document.querySelectorAll('.menu').forEach(x=>x.classList.remove('show'));document.getElementById('modalKicker').textContent='调整安排';document.getElementById('modalTitle').textContent='编辑菜品';document.getElementById('saveBtn').textContent='保存修改';document.getElementById('name').value=editing.name;document.getElementById('note').value=editing.note;document.getElementById('date').value=editing.day;document.getElementById('modalBg').classList.add('show')}function closeModal(){document.getElementById('modalBg').classList.remove('show')}function saveDish(e){e.preventDefault();const name=document.getElementById('name').value.trim(),note=document.getElementById('note').value.trim(),day=document.getElementById('date').value;if(editing){Object.assign(editing,{name,note,day});notice('菜品已更新')}else{dishes.push({id:nextId++,name,note,day,tone:['sage','peach','butter','lilac'][nextId%4]});notice(`已把「${name}」安排到${days.find(x=>x[0]===day)[1]}`)}closeModal();render()}function removeDish(id){dishes=dishes.filter(x=>x.id!==id);notice('这道菜已从本周菜单移除');render()}function moveCandidate(id){const dish=dishes.find(x=>x.id===id);dishes=dishes.filter(x=>x.id!==id);candidates.push({id:dish.id,name:dish.name,note:dish.note||'下次想吃的时候再安排',emoji:'🍽️'});notice(`「${dish.name}」已移入候选菜品区`);render()}function arrange(id){const item=candidates.find(x=>x.id===id);candidates=candidates.filter(x=>x.id!==id);dishes.push({id:nextId++,name:item.name,note:item.note,day:'mon',tone:'sage'});notice(`「${item.name}」已安排到周一`);render()}render();
</script></body></html>
